# Local development infra: Postgres 17 + Redis 7.
# Usage: docker compose -f docker/docker-compose.dev.yml up -d
# Then run the app on the host: pnpm dev (see .env.example for URLs).

name: olym-dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: olym
      POSTGRES_PASSWORD: olym
      POSTGRES_DB: olym
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olym -d olym"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
