# Olym production stack — draft (F1).
# Installed by scripts/install.sh into /opt/olym with a generated .env.
# Pulls the prebuilt application image published by CI (.github/workflows/docker-publish.yml) —
# no build tools required on the host.

name: olym

services:
  olym:
    image: ghcr.io/theinovit/olym:${OLYM_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://olym:${POSTGRES_PASSWORD}@postgres:5432/olym
      REDIS_URL: redis://redis:6379
      DOCKER_HOST: tcp://socket-proxy:2375
      OLYM_DOCKER_NETWORK: ${OLYM_DOCKER_NETWORK:-olym}
      TRAEFIK_CERTRESOLVER: letsencrypt
      DEPLOY_READINESS_PATH: ${DEPLOY_READINESS_PATH:-/}
      DEPLOY_READINESS_TIMEOUT_MS: ${DEPLOY_READINESS_TIMEOUT_MS:-60000}
      DEPLOY_READINESS_INTERVAL_MS: ${DEPLOY_READINESS_INTERVAL_MS:-1000}
      OLYM_PUBLIC_IP: ${OLYM_PUBLIC_IP}
      OLYM_SECRET: ${OLYM_SECRET}
    volumes:
      - olym-data:/data
      - traefik-dynamic:/dynamic
    networks:
      - olym

  olym-worker:
    image: ghcr.io/theinovit/olym:${OLYM_VERSION:-latest}
    restart: unless-stopped
    command: ["node", "worker.cjs"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://olym:${POSTGRES_PASSWORD}@postgres:5432/olym
      REDIS_URL: redis://redis:6379
      DOCKER_HOST: tcp://socket-proxy:2375
      OLYM_DOCKER_NETWORK: ${OLYM_DOCKER_NETWORK:-olym}
      TRAEFIK_CERTRESOLVER: letsencrypt
      DEPLOY_READINESS_PATH: ${DEPLOY_READINESS_PATH:-/}
      DEPLOY_READINESS_TIMEOUT_MS: ${DEPLOY_READINESS_TIMEOUT_MS:-60000}
      DEPLOY_READINESS_INTERVAL_MS: ${DEPLOY_READINESS_INTERVAL_MS:-1000}
    networks:
      - olym

  migrate:
    image: ghcr.io/theinovit/olym:${OLYM_VERSION:-latest}
    restart: "no"
    command: ["node", "migrate.cjs"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://olym:${POSTGRES_PASSWORD}@postgres:5432/olym
    networks:
      - olym

  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      SERVICES: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - olym

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: olym
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: olym
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olym -d olym"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - olym

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - olym

  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    depends_on:
      olym:
        condition: service_started
      socket-proxy:
        condition: service_started
    command:
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://socket-proxy:2375
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "${OLYM_HTTP_PORT:-80}:80"
      - "${OLYM_HTTPS_PORT:-443}:443"
    volumes:
      - traefik-acme:/acme
      - traefik-dynamic:/dynamic:ro
    networks:
      - olym

networks:
  olym:
    name: ${OLYM_DOCKER_NETWORK:-olym}

volumes:
  olym-data:
  postgres-data:
  redis-data:
  traefik-acme:
  traefik-dynamic:
