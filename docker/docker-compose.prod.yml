# Olym production stack — draft (F1).
# Installed by scripts/install.sh into /opt/olym with a generated .env.
# Builds the application image locally from the repository Dockerfile.

name: olym

services:
  olym:
    build:
      context: ..
      dockerfile: Dockerfile
    image: olym:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://olym:${POSTGRES_PASSWORD}@postgres:5432/olym
      REDIS_URL: redis://redis:6379
      DOCKER_HOST: tcp://socket-proxy:2375
      OLYM_HOST: ${OLYM_HOST}
      OLYM_SECRET: ${OLYM_SECRET}
    volumes:
      - olym-data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.olym.rule=Host(`${OLYM_HOST}`)
      - traefik.http.routers.olym.entrypoints=websecure
      - traefik.http.routers.olym.tls.certresolver=letsencrypt
      - traefik.http.services.olym.loadbalancer.server.port=3000
    networks:
      - olym

  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      SERVICES: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - olym

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: olym
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: olym
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olym -d olym"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - olym

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - olym

  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    depends_on:
      socket-proxy:
        condition: service_started
    command:
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://socket-proxy:2375
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik-acme:/acme
    networks:
      - olym

networks:
  olym:
    name: olym

volumes:
  olym-data:
  postgres-data:
  redis-data:
  traefik-acme:
